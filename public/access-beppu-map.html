<style>

  .ab-right-header {

    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;

  .ab-question {

  .ab-chip-row {
    display: flex;
    gap: 20px;
  }

  #ab-main-categories {

  }

  #ab-sub-categories {
    display: flex;
    gap: 20px;

  .ab-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    white-space: nowrap;
  }

  .ab-chip-emoji {
    font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
    font-size: 14px;
    line-height: 1;
    letter-spacing: 0;
    font-variant-emoji: emoji;
    margin-right: 1px;
  }

  .ab-chip-text {
    white-space: nowrap;
    line-height: 1;
  }

  .ab-chip-row.sub {
    gap: 8px;
  }

  .ab-chip {
    border: none;
    border-radius: 4px;
    background: #b5aea3;
    color: #292826;
    padding: 4px 22px;
    min-height: 28px;
    font-size: 14px;
    letter-spacing: 1.4px;
    line-height: 1;
    cursor: pointer;
    width: auto;
    flex: 0 0 auto;
    position: relative;
    overflow: hidden;
    transform: translateZ(0);
    transition:
      transform 320ms cubic-bezier(0.22, 0, 0.09, 0.99),
      box-shadow 320ms cubic-bezier(0.22, 0, 0.09, 0.99),
      color 320ms cubic-bezier(0.22, 0, 0.09, 0.99);
  }

  .ab-chip.is-active {
    background: #4d4b49;
    color: #edebe4;
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
  }

  .ab-chip.is-active::after {
    transform: scaleY(1);
  }

  .ab-chip::before {
    content: "";
    position: absolute;
    inset: 0;
    background: #b5aea3;
    transform: scaleY(0);
    transform-origin: bottom center;
    transition: transform 300ms cubic-bezier(0.22, 0, 0.09, 0.99);
    pointer-events: none;
    z-index: 0;
  }

  .ab-chip::after {
    content: "";
    position: absolute;
    inset: 0;
    background: #4d4b49;
    transform: scaleY(0);
    transform-origin: top center;
    transition: transform 320ms cubic-bezier(0.22, 0, 0.09, 0.99);
    pointer-events: none;
    z-index: 0;
  }

  .ab-chip:hover:not(.is-active) {
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
  }

  .ab-chip:hover:not(.is-active)::before {
    transform: scaleY(1);
  }

  .ab-chip:active {
    transform: translateY(0) scale(0.985);
  }

  .ab-chip-emoji,
  .ab-chip-text {
    position: relative;
    z-index: 1;
  }

  .ab-chip-emoji {
    transition: transform 320ms cubic-bezier(0.22, 0, 0.09, 0.99), filter 320ms cubic-bezier(0.22, 0, 0.09, 0.99);
  }

  .ab-chip:hover:not(.is-active) .ab-chip-emoji {
    transform: translateY(-1px) scale(1.08);
    filter: saturate(1.04);
  }

  .ab-chip.is-active:hover .ab-chip-emoji {
    transform: none;
    filter: none;
  }

  }

  #beppu-map {

  }

  .ab-nearby-chip {

    top: 14px;

  #beppu-route-chip {

  #beppu-route-chip.has-preview {

  .beppu-route-line {

  }

  #beppu-route-chip.is-fallback {
    color: #8a2d2d;
  }

  .beppu-route-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 8px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.96);
    color: #1f1f1f;
    border: 1px solid rgba(0, 0, 0, 0.08);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);

  .beppu-place-preview {
    display: inline-flex;
    align-items: center;
    flex-direction: row;
    gap: 6px;
    max-width: 320px;
    padding: 5px 7px;

    border: 1px solid rgba(0, 0, 0, 0.08);

    pointer-events: none;

  .beppu-place-preview__thumb {

    height: 30px;

  .beppu-place-preview__name {

    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1px;
    color: #1f1f1f;
    line-height: 1.2;
    flex: 1 1 auto;
    min-width: 0;
    display: -webkit-box;
    -webkit-line-clamp: 1;

    text-overflow: ellipsis;

  .beppu-place-preview__status {

  .beppu-place-preview__status.is-unknown {

  }

      radial-gradient(circle at 66% 35%, rgba(217, 217, 217, 0.12), transparent 22%),

  .ab-map-fallback .ab-map-mock__route {

    left: 250px;

  .ab-map-fallback .ab-map-mock__poi {

  .ab-map-fallback .ab-map-mock__poi.p1 { left: 285px; top: 132px; }
  .ab-map-fallback .ab-map-mock__poi.p2 { left: 480px; top: 108px; }
  .ab-map-fallback .ab-map-mock__poi.p3 { left: 260px; top: 286px; }

  .ab-map-fallback .ab-map-mock__msg {

  .gm-style .gm-err-container {
    display: none !important;
  }

  /* JMIKB - ShopIntro */
  .ab-list-col {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-radius: 3.5px;
  }

  /* 3Hhbm - ShopList */
  #beppu-list {
    display: flex;
    flex-direction: column;
    gap: 15px;
    flex: 1;
    min-height: 0;
    border-radius: 3.5px;
    overflow: auto;

  /* Lb2v3 - ListItem */
  .spot-item {
    width: 100%;
    height: 134px;
    min-height: 134px;
    display: flex;
    background: #d1cdc5;

  }

  .spot-item.is-hidden {
    display: none;
  }

  .spot-item.is-active {
    outline-color: #333333;
    transform: none;
    box-shadow: none;
    animation: spotActiveInkIn 260ms cubic-bezier(0.22, 0, 0.09, 0.99) both;
  }

  .spot-item:hover:not(.is-active),
  .spot-item.is-hover:not(.is-active) {
    background: #d1cdc5;
    border-color: #b5aea3;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);

  .spot-thumb-wrap {

  .spot-thumb {

  .spot-body {

  .spot-header {

  }

  .spot-text-block {

    flex-direction: column;

    min-width: 0;
    flex: 1;
  }

  .spot-name {
    margin: 0;
    font-family: "A P-OTF A1Gothic Std", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", sans-serif;
    font-weight: 400;

    font-size: var(--spot-name-size, 24px);

    min-width: 0;
    white-space: nowrap;

  /* p9DEz - Divider */
  .spot-divider {

  }

  /* QVZxB - Genre */
  .spot-subtitle {

    font-size: 11px;

  }

  /* fpCXQ - Description */
  .spot-description {

    font-size: 13px;
    letter-spacing: 1.3px;

  .spot-arrow {
    width: 40px;
    height: 40px;
    border-radius: 999px;
    border: 1px solid #c93400;
    display: grid;
    place-items: center;
    color: #c93400;
    font-size: 15px;
    flex-shrink: 0;
    background: transparent;
    transition: background-color 450ms cubic-bezier(0.22, 0, 0.09, 0.99), border-color 450ms cubic-bezier(0.22, 0, 0.09, 0.99), color 450ms cubic-bezier(0.22, 0, 0.09, 0.99), box-shadow 450ms cubic-bezier(0.22, 0, 0.09, 0.99), transform 450ms cubic-bezier(0.22, 0, 0.09, 0.99);

  }

  .spot-arrow-icon {

    mask-image: url("./assets/images/icon-arrow.svg");

  .ab-modal-overlay {

  }

  .ab-shop-modal {

    display: inline-block;
    width: 12px;
    height: 12px;
    background-color: currentColor;
    -webkit-mask-image: url("./assets/images/icon-close.svg");
    -webkit-mask-repeat: no-repeat;
    -webkit-mask-position: center;

    function formatClockText(input) {
      var text = String(input || '').trim();
      if (!text) return '';
      var parts = text.split(':');
      if (parts.length < 2) return text;
      var hh = Number(parts[0]);
      var mm = Number(parts[1]);
      if (!Number.isFinite(hh) || !Number.isFinite(mm)) return text;
      return String(hh) + ':' + String(mm).padStart(2, '0');
    }

    function parseBusinessHoursJson(value) {
      var raw = String(value || '').trim();
      if (!raw || raw[0] !== '{') return null;
      try {
        var parsed = JSON.parse(raw);
        return parsed && typeof parsed === 'object' ? parsed : null;
      } catch (error) {
        return null;
      }
    }

    function parseBusinessHoursTextToMap(text) {
      if (!text || typeof text !== 'string') return null;
      var dayMap = { '月曜日': '月', '火曜日': '火', '水曜日': '水', '木曜日': '木', '金曜日': '金', '土曜日': '土', '日曜日': '日' };
      var result = {};
      var segments = text.split('|');
      var hasAny = false;
      segments.forEach(function (seg) {
        var trimmed = seg.trim();
        if (!trimmed) return;
        var colonIdx = trimmed.indexOf(':');
        if (colonIdx < 0) colonIdx = trimmed.indexOf('：');
        if (colonIdx < 0) return;
        var dayPart = trimmed.substring(0, colonIdx).trim();
        var timePart = trimmed.substring(colonIdx + 1).trim();
        var dayKey = dayMap[dayPart];
        if (!dayKey) return;
        if (timePart === '定休日' || timePart === '休業' || timePart === '休み') {
          result[dayKey] = [];
          hasAny = true;
          return;
        }
        var periods = [];
        var timeRanges = timePart.split(',');
        timeRanges.forEach(function (range) {
          range = range.trim();
          var match = range.match(/(\d{1,2})時(\d{2})分[～〜\-](\d{1,2})時(\d{2})分/);
          if (match) {
            periods.push({ open: match[1] + ':' + match[2], close: match[3] + ':' + match[4] });
          }
        });
        if (periods.length > 0) {
          result[dayKey] = periods;
          hasAny = true;
        }
      });
      return hasAny ? result : null;
    }

    function formatBusinessHoursSummary(hoursJson) {
      var days = ['月', '火', '水', '木', '金', '土', '日'];
      if (!hoursJson) {
        return { closedText: '情報なし', hoursText: '情報なし' };
      }

      var closedDays = [];
      var groupedByLine = {};
      var groupedOrder = [];
      days.forEach(function (dayKey) {
        var periods = Array.isArray(hoursJson[dayKey]) ? hoursJson[dayKey] : [];
        if (!periods.length) {
          closedDays.push(dayKey + '曜');
          return;
        }
        var line = periods.map(function (period) {
          var openText = formatClockText(period && period.open);
          var closeText = formatClockText(period && period.close);
          if (!openText || !closeText) return '';
          return openText + '~' + closeText;
        }).filter(Boolean).join(' / ');
        if (line) {
          if (!groupedByLine[line]) {
            groupedByLine[line] = [];
            groupedOrder.push(line);
          }
          groupedByLine[line].push(dayKey);
        }
      });

      var hoursLines = groupedOrder.map(function (line) {
        return groupedByLine[line].join('・') + ' ' + line;
      });

      return {
        closedText: closedDays.length ? closedDays.join(' / ') : 'なし',
        hoursText: hoursLines.length ? hoursLines.join('\n') : '情報なし'
      };
    }

    function readCardStatusMeta(placeId) {

      if (!placeId) return fallback;

      cards.forEach(function (el) {
        if (!card && el.dataset.placeId === String(placeId)) card = el;

      var statusEl = card.querySelector('.spot-open-status');
      if (!statusEl) return fallback;
      var text = String(statusEl.textContent || '').trim() || fallback.text;
      var state = statusEl.classList.contains('is-open')
        ? 'is-open'
        : (statusEl.classList.contains('is-closed') ? 'is-closed' : 'is-unknown');
      return { text: text, state: state };
    }

      };
      modalMainPhotoEl.src = nextUrl;
      modalMainPhotoEl.alt = (place && place.name) || '';

    function renderShopModal(place) {
      if (!place) return;
      modalPlaceId = place.id;
      modalTitleEl.textContent = place.name || '店舗名';
      modalGenreEl.textContent = place.subtitle || place.category || 'カテゴリ情報なし';
      modalDescEl.textContent = place.description || '説明はありません。';
      renderModalLiveStatus(place.id);

      var parsedHours = parseBusinessHoursJson(place.businessHours);
      if (!parsedHours && place.businessHoursText) {
        parsedHours = parseBusinessHoursTextToMap(place.businessHoursText);
      }
      var hoursSummary = formatBusinessHoursSummary(parsedHours);
      modalClosedEl.textContent = hoursSummary.closedText;
      modalHoursEl.textContent = hoursSummary.hoursText;

      // Set route info
      if (modalRouteEl) {
        var dx = (place.lat - HOTEL_COORDS.lat) * 111320;
        var dy = (place.lng - HOTEL_COORDS.lng) * 111320 * Math.cos(place.lat * Math.PI / 180);
        var straightDist = Math.sqrt(dx * dx + dy * dy);
        var walkDist = Math.round(straightDist * 1.4);
        var walkMin = Math.max(1, Math.round(walkDist / 80));
        modalRouteEl.textContent = '🚶 Amuから徒歩 約' + walkMin + '分（' + walkDist + 'm）';
      }

      // Set Google Map link
      if (modalGmapBtn) {
        var gmapQuery = encodeURIComponent(place.name + ' 別府');
        var gmapUrl = 'https://www.google.com/maps/search/?api=1&query=' + gmapQuery;
        if (place.placeId && /^ChIJ/.test(String(place.placeId))) {
          gmapUrl += '&query_place_id=' + encodeURIComponent(place.placeId);
        } else if (/^ChIJ/.test(String(place.id))) {
          gmapUrl += '&query_place_id=' + encodeURIComponent(place.id);
        }
        modalGmapBtn.href = gmapUrl;
      }

      var main = place.thumbnail || pickImageFromCsv(place.name, place.category);
      modalPinnedMainPhotoUrl = main;
      setModalMainPhoto(modalPinnedMainPhotoUrl, place, place.name);

      modalSubGridEl.innerHTML = '';
      buildModalSubPhotos(place).forEach(function (url, index) {
        var sub = document.createElement('img');

        sub.onload = function () {
          sub.classList.add('is-loaded');
        };
        sub.src = url;
        sub.alt = (place.name || '店舗') + ' サブ写真 ' + (index + 1);
        sub.onerror = function () {
          sub.onerror = null;
          sub.src = buildPhotoFallback(place.category, (place.name || 'spot') + '-' + index);
          sub.dataset.photoUrl = sub.src;
        };
        sub.addEventListener('mouseenter', function () {
          setModalMainPhoto(sub.dataset.photoUrl || sub.src, place, (place.name || 'spot') + '-hover-' + index);
        });
        sub.addEventListener('mouseleave', function () {
          setModalMainPhoto(modalPinnedMainPhotoUrl, place, place.name);
        });
        sub.addEventListener('focus', function () {
          setModalMainPhoto(sub.dataset.photoUrl || sub.src, place, (place.name || 'spot') + '-focus-' + index);
        });
        sub.addEventListener('blur', function () {
          setModalMainPhoto(modalPinnedMainPhotoUrl, place, place.name);
        });
        sub.addEventListener('click', function () {
          modalPinnedMainPhotoUrl = sub.dataset.photoUrl || sub.src;
          markSelectedSubPhoto(modalPinnedMainPhotoUrl);
          setModalMainPhoto(modalPinnedMainPhotoUrl, place, (place.name || 'spot') + '-pin-' + index);
        });
        modalSubGridEl.appendChild(sub);
      });
      markSelectedSubPhoto(modalPinnedMainPhotoUrl);
    }

    function positionMobileModal() {

      }
      var top = Math.max(0, listRect.top - compact);
      modalEl.style.setProperty('--modal-top', top + 'px');
      modalEl.style.setProperty('--modal-compact-h', compact + 'px');
      modalEl.dataset.compactTop = top;
      if (modalOverlayEl) modalOverlayEl.style.setProperty('--modal-top', top + 'px');

    function fitSpotNameToSingleLine(nameEl) {
      if (!nameEl) return;
      nameEl.style.removeProperty('--spot-name-size');
      var computed = window.getComputedStyle(nameEl);
      var maxSize = parseFloat(computed.fontSize) || 22;
      var minSize = 12;
      var size = maxSize;
      nameEl.style.setProperty('--spot-name-size', size + 'px');
      while (nameEl.scrollWidth > nameEl.clientWidth && size > minSize) {
        size -= 0.5;
        nameEl.style.setProperty('--spot-name-size', size + 'px');
      }
    }

          applyFilters({ autoFit: true });
          renderChips();
        }));
      });

      SUB_CATEGORIES.forEach(function (item) {
        subCategoryEl.appendChild(createChip(item, state.activeSubcategory, function (key) {
          var nextSub = state.activeSubcategory === key ? '' : key;
          state.activeSubcategory = nextSub;
          // Keep filter selection mutually exclusive across main/sub groups.
          if (nextSub) {
            state.activeCategory = '';
          }
          shouldAutoFitFilters = true;
          applyFilters({ autoFit: true });
          renderChips();
        }));
      });
    }

    function createCard(place) {
      var item = document.createElement('article');
      item.className = 'spot-item';
      item.dataset.placeId = place.id;
      item.dataset.slug = place.slug;
      item.dataset.category = place.category;
      item.dataset.subcategory = place.subcategory || '';
      item.dataset.lat = String(place.lat);
      item.dataset.lng = String(place.lng);

      // wAiPd - Thumbnail
      var thumbWrap = document.createElement('div');
      thumbWrap.className = 'spot-thumb-wrap';
      var img = document.createElement('img');
      img.className = 'spot-thumb';
      img.src = place.thumbnail || pickImageFromCsv(place.name, place.category);
      img.alt = place.name;
      img.onerror = function () {
        img.onerror = null;
        img.src = buildPhotoFallback(place.category, place.name);
      };
      thumbWrap.appendChild(img);

      // UrNvj - ItemContent
      var body = document.createElement('div');
      body.className = 'spot-body';

      // TqbqN - TopRow
      var header = document.createElement('div');
      header.className = 'spot-header';

      // FgomF - TextBlock
      var textBlock = document.createElement('div');
      textBlock.className = 'spot-text-block';

      var name = document.createElement('h3');
      name.className = 'spot-name';
      name.textContent = place.name;

      // p9DEz - Divider
      var divider = document.createElement('div');
      divider.className = 'spot-divider';

      // QVZxB - Genre
      var subtitle = document.createElement('p');
      subtitle.className = 'spot-subtitle';
      subtitle.textContent = place.subtitle || place.category || '昼食';

      textBlock.appendChild(name);
      textBlock.appendChild(divider);
      textBlock.appendChild(subtitle);

      // LEYWI - ArrowButton
      var arrow = document.createElement('button');
      arrow.type = 'button';
      arrow.className = 'spot-arrow';
      arrow.setAttribute('aria-label', '店舗詳細を表示');
      var arrowIcon = document.createElement('span');
      arrowIcon.className = 'spot-arrow-icon';
      arrow.appendChild(arrowIcon);
      arrow.addEventListener('click', function () {
        openShopModal(place.id);
      });

      header.appendChild(textBlock);
      header.appendChild(arrow);

      // fpCXQ - Description
      var desc = document.createElement('p');
      desc.className = 'spot-description';
      desc.textContent = place.description || '別府駅・ホテルから徒歩圏内のおすすめスポット。';

      // Hidden open-status for JS modal functionality
      var openStatus = document.createElement('p');
      openStatus.className = 'spot-open-status is-unknown';
      openStatus.textContent = '営業時間情報なし';

      body.appendChild(header);
      body.appendChild(desc);
      body.appendChild(openStatus);

      item.appendChild(thumbWrap);
      item.appendChild(body);

      item.addEventListener('mouseenter', function () {
        if (state.mobile) return;
        item.classList.add('is-hover');
        if (mapModule && typeof mapModule.previewPlaceRoute === 'function') {
          mapModule.previewPlaceRoute(place.id);
        }
      });

      item.addEventListener('mouseleave', function () {
        if (state.mobile) return;
        item.classList.remove('is-hover');
        if (mapModule && typeof mapModule.clearPreviewRoute === 'function') {
          mapModule.clearPreviewRoute();
        }
      });

      return item;
    }

    function buildList() {
      listElement.innerHTML = '';
      places.forEach(function (place) {
        var card = createCard(place);
        place.cardElement = card;
        listElement.appendChild(card);
        var nameEl = card.querySelector('.spot-name');
        fitSpotNameToSingleLine(nameEl);
      });
    }

    function refitAllSpotNames() {
      var names = listElement.querySelectorAll('.spot-name');
      names.forEach(function (nameEl) {
        fitSpotNameToSingleLine(nameEl);
      });
    }

    function getVisiblePlaces() {
      return places.filter(function (place) {
        var hitMain = state.activeCategory === '' || place.category === state.activeCategory;
        var hitSub = state.activeSubcategory === '' || place.subcategory === state.activeSubcategory;
        return hitMain && hitSub;
      });
    }

    function applyCardVisibility(visibleIds) {
      var visibleSet = new Set(visibleIds || []);
      places.forEach(function (place) {
        if (!place.cardElement) return;
        place.cardElement.classList.toggle('is-hidden', !visibleSet.has(place.id));
      });
    }

    function applyFilters(options) {
      var opts = options || {};
      var visiblePlaces = getVisiblePlaces();
      var visibleIds = visiblePlaces.map(function (p) { return p.id; });
      if (mapModule && mapModule.setPlaceVisibility) {
        mapModule.setPlaceVisibility(visibleIds);
        if (opts.autoFit && typeof mapModule.fitToPlaceIds === 'function' && (shouldAutoFitFilters || opts.forceFit)) {
          mapModule.fitToPlaceIds(visibleIds, {
            minZoom: 13,
            maxZoom: 18,
            padding: 56,
            maxDistanceFromHotelMeters: 1200,
          });
          shouldAutoFitFilters = false;
        }
        return;
      }
      applyCardVisibility(visibleIds);
    }

    function normalizeCmsFields(cmsPlaces) {
      return cmsPlaces.map(function (item) {
        var category = normalizeCategoryUi(item.category, '昼食');
        var description = item.description || item.comment || item['コメント'] || item['コメント（店舗）'] || '';
        var text = String(description || '');
        return {
          id: item.id,
          name: item.name,
          slug: item.slug,
          subtitle: category || '昼食',
          category: category,
          subcategory: normalizeCategoryUi(item.subcategory, ''),
          lat: item.lat,
          lng: item.lng,
          thumbnail: item.thumbnail,
          emojiTag: getCategoryEmoji(category, item.name, text),
          description: String(description).trim()
        };
      });
    }

    function normalizeCategoryUi(value, fallback) {
      if (typeof fallback === 'undefined') {
        fallback = '';
      }
      var raw = String(value || '').toLowerCase();
      if (raw === 'all' || raw === 'すべて') return '';
      if (raw === 'lunch' || raw === 'lunches' || raw === 'lunch ' || raw === '昼食') return '昼食';
      if (raw === 'breakfast' || raw === 'morning' || raw === '朝食') return '朝食';
      if (raw === 'dinner' || raw === '夜' || raw === '夕食') return '夕食';
      if (raw === 'drinks' || raw === 'alcohol' || raw === '酒' || raw === 'bar' || raw === 'izakaya' || raw === 'お酒') return 'お酒';
      if (raw === 'cafe' || raw === 'coffee' || raw === 'コーヒー' || raw === '喫茶') return '喫茶';
      if (raw === 'shopping' || raw === '買い物' || raw === 'store' || raw === 'shop' || raw === 'retail' || raw === 'お買いもの') return 'お買いもの';
      if (raw === 'walk' || raw === 'walkable' || raw === 'walk ' || raw === '散歩') return '散歩';
      if (raw === 'parking' || raw === '駐車場') return '駐車場';
      if (raw === 'onsen' || raw === '温泉') return '温泉';
      return fallback;
    }

    function parseCsv(text) {
      var input = String(text || '').replace(/^\uFEFF/, '');
      var rows = [];
      var row = [];
      var cell = '';
      var inQuotes = false;

      for (var i = 0; i < input.length; i += 1) {
        var ch = input[i];
        var next = input[i + 1];

        if (ch === '"') {
          if (inQuotes && next === '"') {
            cell += '"';
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
          continue;
        }

        if (!inQuotes && ch === ',') {
          row.push(cell);
          cell = '';
          continue;
        }

        if (!inQuotes && (ch === '\n' || ch === '\r')) {
          if (ch === '\r' && next === '\n') i += 1;
          row.push(cell);
          cell = '';
          if (row.some(function (v) { return String(v).trim() !== ''; })) {
            rows.push(row);
          }
          row = [];
          continue;
        }

        cell += ch;
      }

      if (cell.length || row.length) {
        row.push(cell);
        if (row.some(function (v) { return String(v).trim() !== ''; })) {
          rows.push(row);
        }
      }

      if (!rows.length) return [];
      var headers = rows[0].map(function (h) { return String(h || '').trim(); });
      var records = [];
      for (var r = 1; r < rows.length; r += 1) {
        var values = rows[r];
        var obj = {};
        for (var c = 0; c < headers.length; c += 1) {
          obj[headers[c]] = values[c] != null ? String(values[c]).trim() : '';
        }
        records.push(obj);
      }
      return records;
    }

    function inferCategoryFromCsv(rawCategory, placeName) {
      var text = String(rawCategory || '').toLowerCase() + ' ' + String(placeName || '').toLowerCase();

      if (text.indexOf('お酒') >= 0 || text.indexOf('酒') >= 0 || text.indexOf('bar') >= 0 || text.indexOf('liquor') >= 0 || text.indexOf('izakaya') >= 0 || text.indexOf('ワイン') >= 0 || text.indexOf('ビール') >= 0) return 'お酒';
      if (text.indexOf('喫茶') >= 0 || text.indexOf('coffee') >= 0 || text.indexOf('カフェ') >= 0 || text.indexOf('珈琲') >= 0) return '喫茶';
      if (text.indexOf('朝食') >= 0 || text.indexOf('breakfast') >= 0 || text.indexOf('morning') >= 0 || text.indexOf('モーニング') >= 0) return '朝食';
      if (text.indexOf('夕食') >= 0 || text.indexOf('dinner') >= 0 || text.indexOf('夜') >= 0) return '夕食';
      if (text.indexOf('ラーメン') >= 0 || text.indexOf('ramen') >= 0 || text.indexOf('そば') >= 0 || text.indexOf('うどん') >= 0) return '昼食';

      if (text.indexOf('restaurant') >= 0 || text.indexOf('食堂') >= 0 || text.indexOf('居酒屋') >= 0 || text.indexOf('食事') >= 0 || text.indexOf('食') >= 0) return '昼食';
      return '昼食';
    }

    function inferSubcategoryFromCsv(rawCategory, placeName, description) {
      var text = String(rawCategory || '') + ' ' + String(placeName || '') + ' ' + String(description || '');
      text = text.toLowerCase();

      if (text.indexOf('store') >= 0 || text.indexOf('shop') >= 0 || text.indexOf('コンビニ') >= 0 || text.indexOf('ショップ') >= 0 || text.indexOf('百貨店') >= 0 || text.indexOf('home_goods_store') >= 0 || text.indexOf('shopping') >= 0 || text.indexOf('retail') >= 0 || text.indexOf('スーパー') >= 0 || text.indexOf('買い物') >= 0 || text.indexOf('お買いもの') >= 0) return 'お買いもの';
      if (text.indexOf('park') >= 0 || text.indexOf('駐車') >= 0 || text.indexOf('parking') >= 0) return '駐車場';
      if (text.indexOf('walk') >= 0 || text.indexOf('散歩') >= 0 || text.indexOf('周辺') >= 0) return '散歩';
      if (text.indexOf('onsen') >= 0 || text.indexOf('温泉') >= 0) return '温泉';
      return '';
    }

    function mapCategoryTagByKeyword(placeName, category) {
      var combined = String(placeName || '') + ' ' + String(category || '');
      if (combined.match(/カレー|curry/)) return 'curry';
      if (combined.match(/ラーメン|ramen/)) return 'ramen';
      if (combined.match(/寿司|sushi/)) return 'sushi';
      if (combined.match(/定食|そば|うどん|そば/)) return 'noodle';
      if (combined.match(/バイキング|イタリアン|italian|パスタ/)) return 'pasta';
      if (combined.match(/ピザ|pizza/)) return 'pizza';
      if (combined.match(/カフェ|喫茶|coffee|珈琲/)) return 'coffee';
      if (combined.match(/バー|酒|ワイン|beer|sake|izakaya|居酒屋/)) return 'bar';
      return category;
    }

    function buildImageSeed(source) {
      var seed = 0;
      var input = String(source || '');
      for (var i = 0; i < input.length; i += 1) {
        seed = (seed * 31 + input.charCodeAt(i)) % 2147483647;
      }
      return String(seed);
    }

    function buildPhotoFallback(category, name) {
      var seed = buildImageSeed(String(category || '') + ':' + String(name || ''));
      return '';
    }

    function pickImageFromCsv(name, category) {
      var tag = mapCategoryTagByKeyword(name, category);
      var queryByTag = {
        curry: 'curry,japanese curry,restaurant',
        ramen: 'ramen,japanese noodle shop,restaurant',
        sushi: 'sushi,restaurant,japan',
        noodle: 'japanese noodles,restaurant',
        pasta: 'italian pasta,restaurant',
        pizza: 'italian pizza,restaurant',
        coffee: 'coffee shop,coffee cup,cafe',
        bar: 'bar,restaurant,night',
        '昼食': 'japanese lunch,food',
        '朝食': 'breakfast,japan,meal',
        '夕食': 'dinner,japan,restaurant',
        'お酒': 'japanese bar,restaurant,drink',
        '喫茶': 'coffee shop,cafe',
        'お買いもの': 'shopping,store,shop',
        散歩: 'japan city street,walkway',
        駐車場: 'parking lot,car',
        温泉: 'onsen,hot spring',
        その他: 'beppu,restaurant,street',
      };
      var query = queryByTag[tag] || queryByTag[category] || 'beppu,restaurant';
      return '';
    }

    function pickDescriptionFromRow(row, name) {
      var candidates = [
        row['コメント'],
        row['レビュー要約文'],
        row['メモ'],
        row['コメント（店舗）'],
        row['comment']
      ];
      for (var i = 0; i < candidates.length; i += 1) {
        var value = String(candidates[i] || '').trim();
        if (value) return value;
      }
      return '別府駅・ホテルから徒歩圏内のおすすめスポット。';
    }

    function mapCsvRowsToPlaces(rows) {
      var places = [];
      rows.forEach(function (row, idx) {
        var lat = Number(row['緯度_detail'] || row['緯度']);
        var lng = Number(row['経度_detail'] || row['経度']);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;

        var name = String(row['タイトル'] || '').trim();
        if (!name) return;

        var slug = String(row['URL内スラッグ'] || '').trim() || ('csv-' + idx);
        var placeId = String(row['place_id'] || '').trim() || slug;
        var rawCategory = row['タグ'] || row['カテゴリ'] || row['カテゴリ '];
        var category = inferCategoryFromCsv(rawCategory, name);
        var desc = pickDescriptionFromRow(row, name);
        var subtitle = normalizeCategoryUi(category);
        var thumbnail = pickImageFromCsv(name, category);
        var subcategory = inferSubcategoryFromCsv(rawCategory, name, desc);
        var emojiTag = getCategoryEmoji(category, name, desc);
        var businessHours = String(row['営業時間'] || '').trim();
        var businessHoursText = String(row['営業時間_曜日'] || '').trim();

        places.push({
          id: placeId,
          name: name,
          slug: slug,
          subtitle: subtitle,
          category: category,
          subcategory: subcategory,
          lat: lat,
          lng: lng,
          tags: category,
          emojiTag: emojiTag,
          thumbnail: thumbnail,
          description: desc || '別府駅・ホテルから徒歩圏内のおすすめスポット。',
          businessHours: businessHours || undefined,
          businessHoursText: businessHoursText || undefined
        });
      });
      return places;
    }

    async function loadDebugCsvPlaces() {
      var rawPaths = [
        window.DEBUG_CSV_PATH,
        'data/beppu-restaurants.csv',
        
        
        
        
        
        
      ].filter(function (path) { return path; });

      var preferredPaths = [];
      rawPaths.forEach(function (path) {
        preferredPaths.push(path);
        try {
          var encoded = encodeURI(path);
          if (encoded !== path) preferredPaths.push(encoded);
        } catch (error) {
          preferredPaths.push(path);
        }
      });

      for (var i = 0; i < preferredPaths.length; i += 1) {
        var path = preferredPaths[i];
        try {
          var response = await fetch(path, { cache: 'no-store' });
          if (!response.ok) continue;
          var text = await response.text();
          var rows = parseCsv(text);
          var mapped = mapCsvRowsToPlaces(rows);
          if (mapped.length) return mapped;
        } catch (error) {
          console.warn('[AccessBeppu] CSV load failed:', path, error);
        }
      }
      return [];
    }

    async function initialize() {
      renderChips();

      var csvPlaces = await loadDebugCsvPlaces();
      var cmsPlaces = [];
      if (window.__WEBFLOW_CMS_RESPONSE) {
        cmsPlaces = mapWebflowCmsItemsToPlaces(window.__WEBFLOW_CMS_RESPONSE);
      }

      places = csvPlaces.length
        ? csvPlaces
        : (cmsPlaces.length ? normalizeCmsFields(cmsPlaces) : fallbackPlaces);
      console.info('[AccessBeppu] places source:', csvPlaces.length ? 'csv' : (cmsPlaces.length ? 'cms' : 'fallback'), 'count=', places.length);

      // Load hours.json and enrich places with latest business hours/status
      try {
        var hoursResp = await fetch('data/hours.json');
        if (hoursResp.ok) {
          var hoursData = await hoursResp.json();
          var hoursShops = hoursData.shops || {};
          var enriched = 0;
          places.forEach(function (place) {
            var entry = hoursShops[place.id] || hoursShops[place.slug];
            if (!entry) return;
            if (entry.hoursMap && !place.businessHours) {
              place.businessHours = JSON.stringify(entry.hoursMap);
              enriched++;
            }
            if (entry.businessStatus === 'CLOSED_TEMPORARILY') {
              place._closedTemporarily = true;
            } else if (entry.businessStatus === 'CLOSED_PERMANENTLY') {
              place._closedPermanently = true;
            }
          });
          console.info('[AccessBeppu] hours.json: enriched', enriched, 'places');
        }
      } catch (e) {
        console.warn('[AccessBeppu] Could not load hours.json:', e.message);
      }

      buildList();
      syncDesktopModalFrame();
      window.addEventListener('resize', function () {
        refitAllSpotNames();
        syncDesktopModalFrame();
      });
      if (modalCloseEl) {
        modalCloseEl.addEventListener('click', function () {
          closeShopModal();
        });
      }
      if (modalDetailBtn) {
        modalDetailBtn.addEventListener('click', function () {
          if (!modalEl) return;
          // Desktop: simple toggle
          if (window.innerWidth > 980) {
            modalEl.classList.toggle('is-expanded');
            return;
          }
          // Mobile: 3-step expand animation
          // Step 1: slide modal up to map top edge
          var mapCol = document.querySelector('.ab-map-col');
          var expandedTop = mapCol ? Math.round(mapCol.getBoundingClientRect().top) : Math.round(window.innerHeight * 0.12);
          modalEl.style.setProperty('--modal-top', expandedTop + 'px');

          function onSlideEnd(e) {
            if (e.propertyName !== 'top') return;
            modalEl.removeEventListener('transitionend', onSlideEnd);
            // Step 2: z-index on top + extend down
            modalOverlayEl.classList.add('is-modal-expanded');
            modalEl.classList.add('is-elevating');
            // Trigger extend-down in next frame
            requestAnimationFrame(function () {
              modalEl.classList.add('is-extending');
              // Step 3: after extend-down, show content
              function onExtendEnd(e2) {
                if (e2.propertyName !== 'max-height') return;
                modalEl.removeEventListener('transitionend', onExtendEnd);
                modalEl.classList.add('is-expanded');
              }
              modalEl.addEventListener('transitionend', onExtendEnd);
            });
          }
          modalEl.addEventListener('transitionend', onSlideEnd);
        });
      }
      if (modalOverlayEl) {
        modalOverlayEl.addEventListener('click', function (event) {
          if (event.target !== modalOverlayEl) return;

          var clickX = event.clientX;
          var clickY = event.clientY;
          closeShopModal();

          // Let the overlay close first, then forward the same click to the underlying UI.
          window.setTimeout(function () {
            var target = document.elementFromPoint(clickX, clickY);
            if (!target) return;
            if (modalOverlayEl && (target === modalOverlayEl || modalOverlayEl.contains(target))) return;
            target.dispatchEvent(new MouseEvent('click', {
              bubbles: true,
              cancelable: true,
              view: window,
              clientX: clickX,
              clientY: clickY
            }));
          }, 0);
        });
      }
      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') closeShopModal();
      });
      window.setInterval(refreshOpenModalStatus, 30000);

      var apiKey = window.GOOGLE_MAPS_API_KEY || '';
      var enablePlacesOpenStatus = window.ENABLE_PLACES_OPEN_STATUS === true;
      var forceMock = window.FORCE_MAP_MOCK === true;
      if (forceMock) {
        setMapFallback('');
        return;
      }
      if (!apiKey) {
        setMapFallback('Google Maps APIキーが未設定です');
        return;
      }

      window.gm_authFailure = function () {
        setMapFallback('Google Maps認証エラー（モック表示）');
      };

      window.initAccessBeppuMap = async function () {
        try {
          mapModule = new BeppuMapModule({
            mapElement: mapElement,
            listElement: listElement,
            routeChipElement: routeChipElement,
            places: places,
            hotel: HOTEL_COORDS,
            station: STATION_COORDS,
            zoom: 16.5,
            routeFitMaxZoom: 17,
            routeFitSkipRatio: 0.85,
            adaptiveNearDistanceMeters: 1200,
            adaptiveZoomStep: 0.8,
            adaptiveZoomMax: 18,
            defaultTimezoneOffsetMinutes: 540,
            enablePlacesOpenStatus: enablePlacesOpenStatus,
            fallbackMessage: '徒歩ルートを取得できませんでした。しばらくしてから再度お試しください。',
            onPlaceSelected: function (id) {
              state.selectedPlaceId = id;
              if (id) openShopModal(id);
            }
          });

          // Load static route data before init
          try {
            var routesResp = await fetch('data/routes.json');
            if (routesResp.ok) {
              var routesData = await routesResp.json();
              mapModule.setStaticRoutes(routesData);
            }
          } catch (e) {
            console.warn('[AccessBeppu] Could not load static routes, will use live API:', e.message);
          }

          await mapModule.init();
          applyFilters();
        } catch (error) {
          routeChipElement.textContent = '地図の読み込みに失敗しました。APIキーとドメイン設定を確認してください。';
          routeChipElement.classList.add('is-fallback');
          console.error('[AccessBeppu] init failed', error);
        }
      };

      var script = document.createElement('script');
      script.src = 'https://maps.googleapis.com/maps/api/js?key=' + encodeURIComponent(apiKey) + '&v=weekly&libraries='
        + encodeURIComponent(enablePlacesOpenStatus ? 'marker,places' : 'marker')
        + '&loading=async&callback=initAccessBeppuMap';
      script.async = true;
      script.defer = true;
      script.onerror = function () {
        setMapFallback('地図の取得に失敗しました（ネットワークまたはAPI制限）');
      };
      document.head.appendChild(script);
    }

    if (app) initialize();
  })();
